<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PaperLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"/>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\\\(',right:'\\\\)',display:false}]})"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #09090e;
      --surface:    #111118;
      --surface2:   #16161f;
      --border:     #1e1e2c;
      --accent:     #c8f04e;
      --accent2:    #4ef0c8;
      --accent3:    #f04e8c;
      --muted:      #2a2a3a;
      --text:       #e8e8f0;
      --text-dim:   #6060a0;
      --text-mid:   #9090b8;
      --card:       #12121a;
      --tag-bg:     #1a1a2a;
      --font-disp:  'Bebas Neue', sans-serif;
      --font-mono:  'DM Mono', monospace;
      --font-body:  'DM Sans', sans-serif;
      --radius:     12px;
      --radius-sm:  6px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID BG ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ── */
    .app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 40px 56px 0;
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }
    .logo {
      font-family: var(--font-disp);
      font-size: clamp(56px, 8vw, 100px);
      letter-spacing: 3px;
      line-height: 1;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .tagline {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      padding-bottom: 14px;
    }

    /* ── MAIN CONTENT ── */
    main {
      padding: 40px 56px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ── UPLOAD ZONE ── */
    .upload-section { display: flex; flex-direction: column; gap: 16px; }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 52px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: #111a08;
    }
    .drop-icon {
      width: 48px; height: 48px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .drop-label {
      font-size: 15px;
      color: var(--text-mid);
      text-align: center;
    }
    .drop-label strong { color: var(--text); font-weight: 500; }
    .drop-sub {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    #file-input { display: none; }

    /* file chips */
    .file-chips {
      display: flex; flex-wrap: wrap; gap: 10px;
      min-height: 0;
    }
    .file-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-mid);
      display: flex; align-items: center; gap: 8px;
    }
    .file-chip .chip-remove {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1;
      transition: color 0.15s;
    }
    .file-chip .chip-remove:hover { color: var(--accent3); }

    /* ── BUTTON ── */
    .btn {
      padding: 14px 32px;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #0a0f00;
      font-weight: 500;
      align-self: flex-start;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: 0.88; }

    /* ── LOADER ── */
    .loader { display: none; align-items: center; gap: 14px; }
    .loader.show { display: flex; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* ── ERROR / WARNING ── */
    .message-box {
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      display: none;
    }
    .message-box.show { display: block; }
    .message-box.error   { background: #1a0810; border: 1px solid #f04e8c44; color: #f04e8c; }
    .message-box.success { background: #0a180a; border: 1px solid #4ef04e44; color: #4ef04e; }

    /* ── RESULTS HEADER ── */
    .results-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .results-header.show { display: flex; }
    .results-title {
      font-family: var(--font-disp);
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }
    .results-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* ── PAPER CARDS ── */
    #results { display: flex; flex-direction: column; gap: 24px; }

    .paper-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 22px 28px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .card-header:hover { background: var(--surface); }

    .card-header-left { flex: 1; display: flex; flex-direction: column; gap: 6px; }

    .card-filename {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .card-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
    }
    .card-authors {
      font-size: 13px;
      color: var(--text-mid);
    }
    .card-meta {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px;
    }
    .meta-pill {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    .meta-pill.accent { border-color: var(--accent); color: var(--accent); }

    .card-chevron {
      color: var(--text-dim);
      font-size: 18px;
      transition: transform 0.25s;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .paper-card.expanded .card-chevron { transform: rotate(180deg); }

    /* card body */
    .card-body {
      display: none;
      padding: 0 28px 28px;
      flex-direction: column;
      gap: 0;
    }
    .paper-card.expanded .card-body { display: flex; }

    /* insight rows */
    .insight-row {
      border-top: 1px solid var(--border);
      padding: 18px 0;
    }
    .insight-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 8px;
    }
    .insight-value {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-mid);
    }
    .insight-value.not-found {
      color: var(--text-dim);
      font-style: italic;
    }

    /* keywords */
    .keywords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .keyword-tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-mid);
    }

    /* formulas */
    .formula-list { display: flex; flex-direction: column; gap: 14px; }
    .formula-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
    }
    .formula-expr {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 6px;
      overflow-x: auto;
    }
    .formula-meaning {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── DIVIDER ── */
    .section-divider {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 0;
    }
    .section-divider span {
      font-family: var(--font-disp);
      font-size: 24px;
      letter-spacing: 2px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    /* ── CHAT PANEL ── */
    #chat-section {
      display: none;
      flex-direction: column;
      gap: 20px;
      padding-bottom: 60px;
    }
    #chat-section.show { display: flex; }

    .chat-window {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 360px;
      max-height: 520px;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .chat-msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeUp 0.25s ease both;
    }
    .chat-msg.user { align-items: flex-end; }
    .chat-msg.assistant { align-items: flex-start; }

    .msg-bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-msg.user .msg-bubble {
      background: var(--accent);
      color: #0a0f00;
      border-bottom-right-radius: 3px;
    }
    .chat-msg.assistant .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-mid);
      border-bottom-left-radius: 3px;
    }
    .msg-sources {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      padding: 0 4px;
    }

    .chat-input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .chat-input-wrap { flex: 1; position: relative; }
    #chat-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 52px;
      max-height: 140px;
    }
    #chat-input::placeholder { color: var(--text-dim); }
    #chat-input:focus { border-color: var(--accent2); }

    .btn-send {
      padding: 14px 24px;
      background: var(--accent2);
      color: #001a14;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send:not(:disabled):hover { opacity: 0.85; }

    /* chat empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 1px;
    }
    .chat-empty-icon { font-size: 28px; opacity: 0.4; }

    /* typing indicator */
    .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Paper<span>Lens</span></div>
    <div class="tagline">Research Intelligence Engine</div>
  </header>

  <main>
    <!-- ── UPLOAD ── -->
    <div class="upload-section">
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">📄</div>
        <div class="drop-label">
          <strong>Drop research papers here</strong> or click to browse
        </div>
        <div class="drop-sub">PDF only · Max 3 papers per batch</div>
        <input type="file" id="file-input" accept=".pdf" multiple/>
      </div>

      <div class="file-chips" id="file-chips"></div>

      <button class="btn btn-primary" id="analyze-btn" disabled>
        Analyze Papers
      </button>

      <div class="loader" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-text">Parsing & extracting insights...</div>
      </div>

      <div class="message-box" id="message-box"></div>
    </div>

    <!-- ── RESULTS ── -->
    <div class="results-header" id="results-header">
      <div class="results-title">INSIGHTS</div>
      <div class="results-count" id="results-count"></div>
    </div>

    <div id="results"></div>

    <!-- ── CHAT ── -->
    <div id="chat-section">
      <div class="section-divider">
        <span>ASK YOUR PAPERS</span>
      </div>

      <div class="chat-window" id="chat-window">
        <div class="chat-empty" id="chat-empty">
          <div class="chat-empty-icon">💬</div>
          <div>Ask anything about your uploaded papers</div>
        </div>
      </div>

      <div class="chat-input-row">
        <div class="chat-input-wrap">
          <textarea
            id="chat-input"
            placeholder="e.g. What methods are common across the papers? Compare their limitations..."
            rows="1"
          ></textarea>
        </div>
        <button class="btn-send" id="send-btn">Send</button>
      </div>
    </div>
  </main>
</div>

<script>
  const API_BASE = '';   // same origin
  const INFO_NOT_FOUND = 'Info not found';

  // ── State ──────────────────────────────────────────────────────────────────
  let selectedFiles = [];
  let sessionId = null;
  let chatHistory = [];
  let isThinking = false;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const fileChips   = document.getElementById('file-chips');
  const analyzeBtn  = document.getElementById('analyze-btn');
  const loader      = document.getElementById('loader');
  const loaderText  = document.getElementById('loader-text');
  const msgBox      = document.getElementById('message-box');
  const resultsHdr  = document.getElementById('results-header');
  const resultsCnt  = document.getElementById('results-count');
  const resultsEl   = document.getElementById('results');
  const chatSection = document.getElementById('chat-section');
  const chatWindow  = document.getElementById('chat-window');
  const chatEmpty   = document.getElementById('chat-empty');
  const chatInput   = document.getElementById('chat-input');
  const sendBtn     = document.getElementById('send-btn');

  // ── File handling ──────────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => handleFiles(Array.from(fileInput.files)));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(Array.from(e.dataTransfer.files));
  });

  function handleFiles(incoming) {
    const pdfs = incoming.filter(f => f.name.toLowerCase().endsWith('.pdf'));
    const nonPdfs = incoming.filter(f => !f.name.toLowerCase().endsWith('.pdf'));
    if (nonPdfs.length) showMessage('Only PDF files are accepted.', 'error');

    for (const f of pdfs) {
      if (selectedFiles.length >= 3) {
        showMessage('Maximum 3 papers per batch.', 'error');
        break;
      }
      if (!selectedFiles.find(s => s.name === f.name)) selectedFiles.push(f);
    }
    renderChips();
    analyzeBtn.disabled = selectedFiles.length === 0;
  }

  function renderChips() {
    fileChips.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'file-chip';
      chip.innerHTML = `<span>${f.name}</span><span class="chip-remove" data-i="${i}">×</span>`;
      fileChips.appendChild(chip);
    });
    fileChips.querySelectorAll('.chip-remove').forEach(el => {
      el.addEventListener('click', () => {
        selectedFiles.splice(Number(el.dataset.i), 1);
        renderChips();
        analyzeBtn.disabled = selectedFiles.length === 0;
      });
    });
  }

  // ── Analyze ────────────────────────────────────────────────────────────────
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFiles.length) return;
    clearMessage();

    analyzeBtn.disabled = true;
    loader.classList.add('show');
    loaderText.textContent = 'Parsing PDFs & extracting insights...';
    resultsHdr.classList.remove('show');
    resultsEl.innerHTML = '';
    chatSection.classList.remove('show');

    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('files', f));

    try {
      const res = await fetch(`${API_BASE}/analyze`, { method: 'POST', body: formData });
      const data = await res.json();

      if (!res.ok) {
        showMessage(data.detail || 'Analysis failed.', 'error');
        return;
      }

      sessionId = data.session_id;
      renderResults(data.papers);
      chatHistory = [];
      chatSection.classList.add('show');
      chatWindow.innerHTML = '';
      chatWindow.appendChild(chatEmpty);
      chatEmpty.style.display = 'flex';

    } catch (err) {
      showMessage('Network error. Is the server running?', 'error');
    } finally {
      loader.classList.remove('show');
      analyzeBtn.disabled = false;
    }
  });

  // ── Render insight cards ───────────────────────────────────────────────────
  function renderResults(papers) {
    resultsEl.innerHTML = '';
    resultsHdr.classList.add('show');
    resultsCnt.textContent = `${papers.length} paper${papers.length !== 1 ? 's' : ''} analysed`;

    papers.forEach((p, idx) => {
      const card = buildCard(p, idx);
      resultsEl.appendChild(card);
    });

    // Re-render KaTeX after cards are in DOM
    if (window.renderMathInElement) {
      setTimeout(() => renderMathInElement(resultsEl, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
          { left: '\\(', right: '\\)', display: false },
        ],
        throwOnError: false,
      }), 100);
    }
  }

  function buildCard(p, idx) {
    const card = document.createElement('div');
    card.className = 'paper-card';
    card.style.animationDelay = `${idx * 0.08}s`;

    const keywords = (p.keywords || []).map(k =>
      `<span class="keyword-tag">${esc(k)}</span>`
    ).join('');

    const formulas = (p.math_formulas || []).map(f => {
      const expr = f.formula && f.formula !== INFO_NOT_FOUND
        ? `$$${f.formula}$$`
        : f.formula;
      return `<div class="formula-item">
        <div class="formula-expr">${esc(expr)}</div>
        <div class="formula-meaning">${esc(f.meaning)}</div>
      </div>`;
    }).join('');

    const fields = [
      { label: 'Abstract',          value: p.abstract },
      { label: 'Problem Statement',  value: p.problem_statement },
      { label: 'Methods',            value: p.methods },
      { label: 'Datasets',           value: p.datasets },
      { label: 'Results',            value: p.results },
      { label: 'Limitations',        value: p.limitations },
      { label: 'Future Work',        value: p.future_work },
    ];

    const fieldRows = fields.map(f => insightRow(f.label, f.value)).join('');

    const formulaRow = p.math_formulas && p.math_formulas.length > 0
      ? `<div class="insight-row">
           <div class="insight-label">Math Formulas</div>
           <div class="formula-list">${formulas}</div>
         </div>`
      : insightRow('Math Formulas', INFO_NOT_FOUND);

    const keywordRow = p.keywords && p.keywords.length > 0
      ? `<div class="insight-row">
           <div class="insight-label">Keywords</div>
           <div class="keywords-wrap">${keywords}</div>
         </div>`
      : insightRow('Keywords', INFO_NOT_FOUND);

    card.innerHTML = `
      <div class="card-header" data-idx="${idx}">
        <div class="card-header-left">
          <div class="card-filename">${esc(p.filename)}</div>
          <div class="card-title">${esc(p.title !== INFO_NOT_FOUND ? p.title : p.filename)}</div>
          <div class="card-authors">${esc(p.authors !== INFO_NOT_FOUND ? p.authors : '')}</div>
          <div class="card-meta">
            ${p.year !== INFO_NOT_FOUND ? `<span class="meta-pill accent">${esc(p.year)}</span>` : ''}
          </div>
        </div>
        <div class="card-chevron">⌄</div>
      </div>
      <div class="card-body">
        ${fieldRows}
        ${formulaRow}
        ${keywordRow}
      </div>`;

    card.querySelector('.card-header').addEventListener('click', () => {
      card.classList.toggle('expanded');
    });

    return card;
  }

  function insightRow(label, value) {
    const notFound = !value || value === INFO_NOT_FOUND;
    return `<div class="insight-row">
      <div class="insight-label">${esc(label)}</div>
      <div class="insight-value${notFound ? ' not-found' : ''}">${esc(notFound ? 'Info not found' : value)}</div>
    </div>`;
  }

  // ── Chat ───────────────────────────────────────────────────────────────────
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = chatInput.scrollHeight + 'px';
  });
  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const question = chatInput.value.trim();
    if (!question || isThinking || !sessionId) return;

    chatEmpty.style.display = 'none';
    isThinking = true;
    sendBtn.disabled = true;
    chatInput.value = '';
    chatInput.style.height = 'auto';

    appendMsg('user', question);
    chatHistory.push({ role: 'user', content: question });

    const typingEl = appendTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          question,
          history: chatHistory.slice(-12),
        }),
      });
      const data = await res.json();
      typingEl.remove();

      const answer = res.ok ? data.answer : (data.detail || 'Error getting response.');
      const sources = res.ok ? (data.sources || []) : [];

      appendMsg('assistant', answer, sources);
      if (res.ok) chatHistory.push({ role: 'assistant', content: answer });

    } catch {
      typingEl.remove();
      appendMsg('assistant', 'Network error. Please try again.');
    } finally {
      isThinking = false;
      sendBtn.disabled = false;
    }
  }

  function appendMsg(role, text, sources = []) {
    const wrap = document.createElement('div');
    wrap.className = `chat-msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (sources.length) {
      const src = document.createElement('div');
      src.className = 'msg-sources';
      src.textContent = 'Sources: ' + sources.join(', ');
      wrap.appendChild(src);
    }

    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'chat-msg assistant';
    wrap.innerHTML = `<div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrap;
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function showMessage(text, type = 'error') {
    msgBox.textContent = text;
    msgBox.className = `message-box show ${type}`;
  }
  function clearMessage() {
    msgBox.className = 'message-box';
    msgBox.textContent = '';
  }
  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
